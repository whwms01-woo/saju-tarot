<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운명의 별빛 - 타로 & 사주</title>
    <style>
        :root {
            --primary: #9b51e0;
            --secondary: #f2994a;
            --bg-color: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #b0a8b9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #0b0f19 0%, #060913 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Nebula effect using radial gradients */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Background Stars/Effects */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.5;
            z-index: 0;
            animation: twinkle 10s infinite alternate;
        }

        /* Shooting star */
        .shooting-star {
            position: fixed;
            top: 20%;
            left: -10%;
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
            transform: rotate(-45deg);
            animation: shooting 5s infinite;
            z-index: 0;
            opacity: 0;
        }
        .shooting-star:nth-child(2) {
            top: 10%; left: 80%;
            animation-delay: 2.5s;
            animation-duration: 7s;
        }

        @keyframes shooting {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 1; }
            20% { transform: translateX(300px) translateY(300px) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }
        
        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #e0c3fc, #8ec5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            margin-bottom: 40px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            transition: all 0.5s ease;
            z-index: -1;
        }

        .glass-card:hover::before {
            left: 150%;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(155, 81, 224, 0.4), 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }

        /* View Sections */
        .view-section {
            display: none;
            width: 100%;
            animation: fadeIn 0.5s ease;
            flex-direction: column;
            align-items: center;
        }

        .view-section.active {
            display: flex;
        }

        /* Tarot Cards */
        .tarot-deck {
            display: flex;
            gap: 5px;
            margin: 20px 0;
            position: relative;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 450px;
        }

        .tarot-card {
            width: 45px;
            height: 70px;
            background: linear-gradient(135deg, #2c1b4d, #1a1025);
            border: 1px solid #b892ff;
            border-radius: 5px;
            margin: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: transparent;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 5px, transparent 5px, transparent 10px);
            font-size: 0.55rem;
            padding: 2px;
            word-break: keep-all;
        }

        .tarot-card:hover {
            transform: translateY(-5px);
            border-color: #fff;
        }

        .tarot-card.selected {
            transform: translateY(-10px);
            box-shadow: 0 5px 15px rgba(184, 146, 255, 0.6);
            border-color: #f2994a;
            color: rgba(255,255,255,0.5);
        }

        .tarot-card.face-up {
            background: linear-gradient(135deg, #4a235a, #150050);
            color: #f1c40f;
            border-color: #f1c40f;
            background-image: none;
            transform: rotateY(360deg) scale(1.1);
            pointer-events: none;
            font-weight: bold;
        }

        .draw-instruction {
            color: var(--secondary);
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
        }

        .result-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            width: 100%;
            text-align: center;
            display: none;
        }
        
        .result-title {
            color: #e0c3fc;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
            width: 100%;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #9b51e0, #56ccf2);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(155, 81, 224, 0.4);
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            margin-top: 30px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tabs */
        .tab-container {
            margin-top: 20px;
            width: 100%;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(155,81,224,0.5);
        }
        .tab-content {
            display: none;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            text-align: center;
            animation: fadeIn 0.3s ease backwards;
        }
        .tab-content.active {
            display: block;
        }
        .tab-quote {
            color: #f2994a;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            background: rgba(242,153,74,0.1);
            padding: 10px;
            border-radius: 8px;
        }
        .tab-desc {
            line-height: 1.6;
            font-size: 0.95rem;
            word-break: keep-all;
            color: #fff;
        }

        /* 2단계: 결과 탭 대형 카드 스타일 및 애니메이션 */
        .large-card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .large-card-img {
            width: 140px;
            height: 230px;
            border-radius: 12px;
            border: 3px solid #f1c40f;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.45), 0 0 10px rgba(155, 81, 224, 0.3);
            object-fit: cover;
            animation: cardSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background-color: #1a1025;
        }
        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3단계: 신비로운 행운의 부적 카드 디자인 */
        .amulet-section {
            width: 100%;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .amulet-card {
            background: linear-gradient(135deg, #16002c 0%, #3a0066 50%, #0d001a 100%);
            border: 2px solid #f1c40f;
            border-radius: 20px;
            padding: 25px 20px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(241, 196, 15, 0.35), inset 0 0 25px rgba(255, 255, 255, 0.05);
            color: #fff;
            margin-bottom: 15px;
        }
        .amulet-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .amulet-title {
            font-size: 0.8rem;
            color: #b892ff;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .amulet-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }
        .amulet-icon {
            font-size: 4rem;
            margin: 15px 0;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(241, 196, 15, 0.6));
            animation: float 3s ease-in-out infinite;
        }
        .amulet-keyword {
            font-size: 1.4rem;
            font-weight: 900;
            color: #f1c40f;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        .amulet-desc {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #e0d0f0;
            word-break: keep-all;
            padding: 0 10px;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* 공유 및 행동 버튼들 */
        .action-btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        .action-btn {
            flex: 1;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-save {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }
        .btn-share {
            background: linear-gradient(135deg, #f2994a, #f2c94c);
            color: #1a1025;
        }

        /* 4단계: 연인 궁합 선택 메뉴 디자인 */
        .compatibility-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 15px;
            animation: fadeInDown 1s ease 0.2s backwards;
        }
        .compatibility-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(242, 153, 74, 0.3);
            box-shadow: 0 6px 24px rgba(242, 153, 74, 0.12), inset 0 0 15px rgba(255, 255, 255, 0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .compatibility-card:hover {
            border-color: rgba(242, 153, 74, 0.7);
            box-shadow: 0 10px 30px rgba(242, 153, 74, 0.35), 0 0 15px rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }
        .compatibility-card .card-title {
            color: #f2994a;
        }

        /* 커플 정보 입력 양방향 그리드 */
        .couple-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            margin-bottom: 20px;
        }
        @media (min-width: 440px) {
            .couple-grid {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
        }
        .couple-form-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 15px;
        }
        .couple-form-card.partner {
            border-color: rgba(242, 153, 74, 0.2);
            background: rgba(242, 153, 74, 0.01);
        }
        .couple-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: #b892ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }
        .couple-title.partner {
            color: #f2994a;
        }

        /* 가로 스크롤 및 모바일 리사이징 방지 가독성 */
        @media (max-width: 480px) {
            h1 {
                font-size: 2.1rem;
            }
            .container {
                padding: 25px 12px;
            }
            .menu-grid {
                gap: 12px;
            }
            .glass-card {
                padding: 25px 12px;
            }
            .tab-btn {
                font-size: 0.8rem;
                padding: 8px 5px;
            }
            .tab-content {
                padding: 15px 10px;
            }
            .large-card-img {
                width: 120px;
                height: 197px;
            }
        }

        /* Toast Alert 메시지 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(15, 12, 41, 0.95);
            border: 1px solid #9b51e0;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(155, 81, 224, 0.4);
            text-align: center;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 워터마크 스타일 복구 및 투명도 고도화 */
        .watermark {
            position: fixed;
            bottom: 15px;
            right: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.18); /* 더 투명하게 처리 */
            z-index: 1000;
            pointer-events: none;
            user-select: none;
        }

        /* 날짜 선택박스 짤림 방지 및 스타일 최적화 */
        .date-select-container {
            display: flex;
            gap: 6px;
            width: 100%;
        }
        .date-select {
            background: rgba(0, 0, 0, 0.25) !important;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: border 0.3s;
            text-align-last: center;
            cursor: pointer;
            height: 42px;
        }
        .date-select:focus {
            border-color: var(--primary);
        }
        .select-year {
            flex: 1.8;
            padding: 8px 2px 8px 8px !important;
            font-size: 0.88rem !important;
        }
        .select-month, .select-day {
            flex: 1.1;
            padding: 8px 2px !important;
            font-size: 0.88rem !important;
        }

        /* ☕ 복채 후원 박스 스타일 */
        .support-box {
            background: rgba(242, 153, 74, 0.05);
            border: 1px dashed rgba(242, 153, 74, 0.3);
            border-radius: 16px;
            padding: 20px 15px;
            margin-top: 30px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 15px rgba(242, 153, 74, 0.05);
        }
        .support-title {
            color: #f2994a;
            font-size: 0.88rem;
            font-weight: bold;
            margin-bottom: 12px;
            word-break: keep-all;
            line-height: 1.4;
        }
        .support-btn {
            display: inline-block;
            background: #ffeb00;
            color: #3c1e1e;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(255, 235, 0, 0.2);
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .support-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 235, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="watermark">제작자: 우경석</div>
    <div class="container">
        <header>
            <h1>운명의 별빛</h1>
            <p class="subtitle">당신의 과거, 현재, 그리고 미래</p>
        </header>

        <!-- Main Menu -->
        <div id="main-menu" class="view-section active">
            <div class="menu-grid">
                <div class="glass-card" onclick="showSection('tarot-section')">
                    <span class="card-icon">🃏</span>
                    <span class="card-title">오늘의 타로</span>
                </div>
                <div class="glass-card" onclick="showSection('saju-section')">
                    <span class="card-icon">📜</span>
                    <span class="card-title">사주 팔자</span>
                </div>
            </div>
            
            <!-- 4단계: 연인 궁합 선택 탭 추가 (가운데 정렬) -->
            <div class="compatibility-container">
                <div class="glass-card compatibility-card" onclick="showSection('chemistry-section')">
                    <span class="card-icon" style="font-size: 2.8rem; margin-bottom: 10px; display: block;">💞</span>
                    <span class="card-title">AI 연인 궁합 (우주 케미)</span>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; font-weight: normal; line-height: 1.4;">
                        너와 나의 우주적 궁합 분석!<br>찰떡인지 아님 파국인지 팩트폭행 드감 💥
                    </p>
                </div>
            </div>

            document.getElementById(`${prefix}-btn-${tabId}`).classList.add('active');
            document.getElementById(`${prefix}-content-${tabId}`).classList.add('active');
        }


        function showSection(sectionId) {

        let selectedCards = [];

        function renderTarotDeck() {
            const deckDiv = document.querySelector('.tarot-deck');
            deckDiv.innerHTML = '';
            selectedCards = [];
            document.getElementById('tarot-instruction').innerText = "카드를 3장 뽑아주세요 (과거/현재/미래)";
            
            let shuffled = [...majorArcana].sort(() => Math.random() - 0.5);
            
            shuffled.forEach((card) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'tarot-card';
                cardEl.onclick = () => selectCard(cardEl, card);
                deckDiv.appendChild(cardEl);
            });
        }

        function selectCard(cardEl, card) {
            if (selectedCards.length >= 3 || cardEl.classList.contains('selected')) return;
            
            // 클릭하자마자 바로 뒤집고 이미지 렌더링
            cardEl.classList.add('selected');
            cardEl.classList.add('face-up');
            selectedCards.push(card);

            cardEl.style.backgroundImage = `url('${card.img}')`;
            cardEl.style.backgroundSize = 'cover';
            cardEl.style.backgroundPosition = 'center';
            cardEl.style.border = '2px solid #f1c40f';
            cardEl.style.position = 'relative';
            cardEl.style.overflow = 'hidden';
            
            // 카드 하단에 이름 표시
            const koreanName = card.name.split('(')[1].replace(')','');
            cardEl.innerHTML = `<div style="background:rgba(0,0,0,0.7); color:#fff; width:100%; position:absolute; bottom:0; left:0; font-size:0.65rem; padding:3px 0; font-weight:bold;">${koreanName}</div>`;

            const instruction = document.getElementById('tarot-instruction');
            if (selectedCards.length === 1) instruction.innerText = "현재 상황을 나타낼 두 번째 카드를 뽑아주세요.";
            if (selectedCards.length === 2) instruction.innerText = "미래를 나타낼 세 번째 카드를 뽑아주세요.";
            if (selectedCards.length === 3) {
                instruction.innerText = "우주의 기운을 읽는 중...";
                setTimeout(() => {
                    drawTarotReading();
                }, 500);
            }
        }

        // Toast Helper
        function showToast(msg) {
            const toast = document.getElementById('toast-alert');
            if (!toast) return;
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2800);
        }

        // html2canvas Dynamic Loader
        function loadHtml2Canvas(callback) {
            if (window.html2canvas) {
                callback();
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
            script.onload = callback;
            script.onerror = () => showToast('부적 이미지 저장 엔진 로드 실패. 공유하기를 이용해 주세요.');
            document.head.appendChild(script);
        }

        // Amulet Download Helper
        function downloadAmuletCard(elementId, filename) {
            showToast('부적 이미지를 제작하는 중... 🌌');
            loadHtml2Canvas(() => {
                const element = document.getElementById(elementId);
                const originalBoxShadow = element.style.boxShadow;
                element.style.boxShadow = 'none'; // prevents safari canvas issues
                
                html2canvas(element, {
                    useCORS: true,
                    backgroundColor: '#0c081f',
                    scale: 2 // High Quality
                }).then(canvas => {
                    element.style.boxShadow = originalBoxShadow;
                    try {
                        const link = document.createElement('a');
                        link.download = `${filename}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        showToast('부적이 사진첩에 저장되었습니다! 💾');
                    } catch (err) {
                        console.error(err);
                        showToast('저장 권한 부족. 스크린샷으로 저장해 주세요!');
                    }
                });
            });
        }

        // Sharing Helper
        function shareResult(title, text) {
            const shareUrl = window.location.href;
            const fullText = `${text}\n${shareUrl}`;
            
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            if (isMobile && navigator.share) {
                navigator.share({
                    title: title,
                    text: fullText,
                    url: shareUrl
                }).then(() => {
                    showToast('성공적으로 공유되었습니다! ✨');
                }).catch(err => {
                    if (err.name !== 'AbortError') {
                        copyTextToClipboard(fullText);
                    }
                });
            } else {
                copyTextToClipboard(fullText);
            }
        }

        function copyTextToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('결과가 클립보드에 복사되었습니다! 📢');
            }).catch(err => {
                console.error(err);
                showToast('복사 실패. 스크린샷을 사용해 주세요!');
            });
        }

                        </details>
                    </div>
                `;
            } else {
                resultBox.innerHTML = `
                    <div style="padding: 25px 20px; border-radius: 15px; border: 1px solid rgba(255, 107, 107, 0.3); background: rgba(255, 107, 107, 0.05); text-align: center;">
                        <span style="font-size: 2.5rem; display: block; margin-bottom: 12px;">⚠️</span>

        async function drawTarotReading() {
            const resultBox = document.getElementById('tarot-result');
            
            resultBox.innerHTML = `
                <div style="padding: 40px 20px; text-align: center; color: #b892ff;">
                    <span style="font-size: 2rem; display: block; margin-bottom: 15px; animation: pulse 1.5s infinite;">🔮</span>
                    과거, 현재, 미래의 흐름을<br>AI가 분석하고 있습니다...
                </div>
            `;
            resultBox.style.display = 'block';
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            const cardNames = selectedCards.map(c => c.name);
            // 1단계: 로컬 캐싱 키 (YYYY-MM-DD + 카드조합)
            const cacheKey = "tarot_" + new Date().toISOString().split('T')[0] + "_" + encodeURIComponent(cardNames.sort().join('_'));
            const cachedData = localStorage.getItem(cacheKey);

            if (cachedData) {
                console.log("[Cache] Loaded tarot result from localStorage!");
                setTimeout(() => {
                    renderTarotResult(JSON.parse(cachedData));
                }, 1200);
                return;
            }

            try {
                const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:')
                    ? 'http://localhost:3000'
                    : window.location.origin;
                const response = await fetch(`${apiBase}/api/tarot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cards: cardNames })
                });
                
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || `서버 에러 (${response.status})`);
                }
                const data = await response.json();
                
                localStorage.setItem(cacheKey, JSON.stringify(data));
                renderTarotResult(data);
            } catch (error) {
                console.error(error);
                renderError(resultBox, error.message, '타로');
            }
        }

        async function analyzeChemistry() {
            const btn = document.querySelector('#chemistry-section .btn');
            const originalText = btn.innerText;
            const resultBox = document.getElementById('chemistry-result');
            
            const myName = document.getElementById('chem-my-name').value.trim();
            const partnerName = document.getElementById('chem-partner-name').value.trim();
            
            const myYear = document.getElementById('chem-my-year').value;
            const myMonth = document.getElementById('chem-my-month').value;
            const myDay = document.getElementById('chem-my-day').value;
            const myTime = document.getElementById('chem-my-time').value;
            
            const partnerYear = document.getElementById('chem-partner-year').value;
            const partnerMonth = document.getElementById('chem-partner-month').value;
            const partnerDay = document.getElementById('chem-partner-day').value;
            const partnerTime = document.getElementById('chem-partner-time').value;
            
            if(!myName || !partnerName) {
                showToast('나와 상대방의 이름을 모두 입력해 주세요!');
                return;
            }
            
            let myBirthDate = "";
            if(myYear && myMonth && myDay) myBirthDate = `${myYear}년 ${myMonth}월 ${myDay}일`;
            
            let partnerBirthDate = "";
            if(partnerYear && partnerMonth && partnerDay) partnerBirthDate = `${partnerYear}년 ${partnerMonth}월 ${partnerDay}일`;
            
            btn.innerText = 'AI가 우주 궁합을 맞추는 중... 💞';
            btn.disabled = true;
            
            resultBox.innerHTML = `
                <div style="padding: 40px 20px; text-align: center; color: #f2994a;">
                    <span style="font-size: 2rem; display: block; margin-bottom: 15px; animation: pulse 1.5s infinite;">💞</span>

                </div>
            `;
            resultBox.style.display = 'block';
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // 1단계: 로컬 캐싱 키 (YYYY-MM-DD + 두사람 조합)
            const cacheKey = "chem_" + new Date().toISOString().split('T')[0] + "_" + encodeURIComponent(myName + "_" + myBirthDate + "_" + partnerName + "_" + partnerBirthDate);
            const cachedData = localStorage.getItem(cacheKey);
            
            if(cachedData) {
                console.log("[Cache] Loaded chemistry result from localStorage!");
                setTimeout(() => {
                    renderChemistryResult(JSON.parse(cachedData), myName, partnerName, btn, originalText);
                }, 1200);
                return;
            }
            
            try {
                const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:')
                    ? 'http://localhost:3000'
                    : window.location.origin;
                const response = await fetch(`${apiBase}/api/chemistry`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        myName, myBirthDate, myBirthTime: myTime, 
                        partnerName, partnerBirthDate, partnerBirthTime: partnerTime 
                    })
                });
                
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || `서버 에러 (${response.status})`);
                }
                const data = await response.json();
                
                localStorage.setItem(cacheKey, JSON.stringify(data));
                renderChemistryResult(data, myName, partnerName, btn, originalText);
            } catch (error) {
                console.error(error);
                renderError(resultBox, error.message, '궁합');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
